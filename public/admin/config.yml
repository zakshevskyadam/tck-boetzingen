backend:
  name: github
  repo: zakshevskyadam/tck-boetzingen
  branch: main

publish_mode: simple
media_folder: "public/images/gallery"
public_folder: "/images/gallery"

locale: "de"

collections:
  - name: "events"
    label: "📅 Veranstaltungen"
    label_singular: "Veranstaltung"
    folder: "src/content/events"
    path: "{{slug}}/index"
    extension: "yaml"
    format: "yaml"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { name: "title", label: "Titel", widget: "string" }
      - { name: "date", label: "Datum", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false }
      - { name: "description", label: "Beschreibung", widget: "text" }

  - name: "news"
    label: "📰 Neuigkeiten"
    label_singular: "Neuigkeit"
    folder: "src/content/news"
    path: "{{slug}}/index"
    extension: "yaml"
    format: "yaml"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { name: "title", label: "Titel", widget: "string" }
      - { name: "date", label: "Datum", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD.MM.YYYY", time_format: false }
      - { name: "excerpt", label: "Kurzbeschreibung", widget: "text" }

  - name: "board"
    label: "👥 Vorstand"
    label_singular: "Vorstandsmitglied"
    folder: "src/content/board-members"
    path: "{{slug}}/index"
    extension: "yaml"
    format: "yaml"
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — {{role}}"
    fields:
      - { name: "name", label: "Name", widget: "string" }
      - { name: "role", label: "Rolle", widget: "string" }
      - { name: "email", label: "E-Mail", widget: "string" }
      - { name: "responsibilities", label: "Aufgaben", widget: "text" }
      - { name: "sortOrder", label: "Sortierung", widget: "number", default: 0 }

  - name: "teams"
    label: "🏅 Mannschaften"
    label_singular: "Mannschaft"
    folder: "src/content/teams"
    path: "{{slug}}/index"
    extension: "yaml"
    format: "yaml"
    create: true
    slug: "{{slug}}"
    summary: "{{name}} ({{season}})"
    fields:
      - { name: "name", label: "Name", widget: "string" }
      - { name: "league", label: "Liga", widget: "string" }
      - name: "season"
        label: "Saison"
        widget: "select"
        options:
          - { label: "Sommer", value: "summer" }
          - { label: "Winter", value: "winter" }
      - { name: "trainingDay", label: "Trainingstag", widget: "string", required: false }

  - name: "faq"
    label: "❓ FAQ"
    label_singular: "FAQ-Eintrag"
    folder: "src/content/faq"
    path: "{{slug}}/index"
    extension: "yaml"
    format: "yaml"
    create: true
    slug: "{{slug}}"
    summary: "{{question}}"
    fields:
      - { name: "question", label: "Frage", widget: "string" }
      - { name: "answer", label: "Antwort", widget: "text" }
      - name: "category"
        label: "Kategorie"
        widget: "select"
        options:
          - { label: "Clubhaus", value: "clubhaus" }
          - { label: "Tennishalle", value: "tennishalle" }
          - { label: "Mitgliedschaft", value: "mitgliedschaft" }
          - { label: "Außenplätze", value: "aussenplaetze" }
          - { label: "Jugendtraining", value: "jugendtraining" }
          - { label: "Mitgliederservice", value: "mitgliederservice" }
      - { name: "sortOrder", label: "Sortierung", widget: "number", default: 0 }
