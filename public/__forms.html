<!DOCTYPE html>
<html>
<head>
<title>Forms</title>
</head>
<body>
<!-- Hidden form templates for Netlify Forms detection -->

<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />
  <input type="text" name="vorname" />
  <input type="email" name="email" />
  <textarea name="nachricht"></textarea>
  <input type="checkbox" name="datenschutz" />
</form>

<form name="zutrittsberechtigung" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name" />
  <input type="text" name="vorname" />
  <input type="email" name="email" />
  <input type="radio" name="schluesseltyp" value="anhaenger" />
  <input type="radio" name="schluesseltyp" value="karte" />
  <textarea name="notizen"></textarea>
  <input type="checkbox" name="datenschutz" />
</form>

</body>
</html>
