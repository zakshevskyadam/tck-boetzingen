question: Wann sind die Beiträge für das Jugendtraining fällig?
answer: "Bei monatlicher Zahlung wird der Beitrag zum 10. eines Monats eingezogen. Bei saisonaler Zahlung erfolgt der Einzug zum 10. Mai (Sommer) bzw. 10. Oktober (Winter). Die Zahlung erfolgt ausschließlich per Lastschrift."
