question: Kann ich auf den Freiplätzen mit einem Gast spielen?
answer: "Ja, das ist möglich. Bei der Platzbuchung in unserem Online-Buchungssystem wählen Sie als Mitspieler \"Gast\" aus. Die Gastspielgebühr wird dann per Lastschrift eingezogen. Den aktuellen Preis entnehmen Sie bitte der Beitragsordnung."
