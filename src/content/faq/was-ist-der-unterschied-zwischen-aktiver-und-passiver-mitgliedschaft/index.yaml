question: Was ist der Unterschied zwischen aktiver und passiver Mitgliedschaft?
answer: |-
  Aktive Mitglieder können unbegrenzt auf allen Plätzen spielen und leisten 12 Arbeitsstunden pro Jahr. Passive Mitglieder dürfen bis zu 6 Mal pro Jahr spielen und zahlen dafür eine reduzierte Gebühr von 50€.
category: mitgliedschaft
sortOrder: 1
