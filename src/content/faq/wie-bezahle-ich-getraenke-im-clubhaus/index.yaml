question: Wie bezahle ich meine Getränke im Clubhaus?
answer: "Am einfachsten beim Personal des Wirtedienstes direkt an der Kasse. Falls keine Bewirtung da ist, können Sie Ihren Zettel in den weißen Briefkasten neben der Küchentür einwerfen. Die Beträge werden gesammelt und in unregelmäßigen Abständen per Lastschrift eingezogen."
