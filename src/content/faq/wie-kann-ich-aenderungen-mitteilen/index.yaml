question: Wie kann ich Änderungen an meinen Daten mitteilen?
answer: "Über unser Mitgliederservice-Formular auf der Kontaktseite können Sie folgende Änderungen direkt übermitteln: Adressänderung, Änderung der Bankverbindung, Mitgliedschaftsstatus (aktiv/passiv), Nachweis Schüler/Azubi/Student, Änderung des Zahlungsrhythmus für das Jugendtraining."
category: mitgliederservice
sortOrder: 1
