question: Kann ich mit meinem Kind in der Tennishalle spielen?
answer: "Ja! Als Elternteil können Sie mit Ihrem Kind in der Halle spielen. Wenn Sie kein Mitglied sind, sollte die Buchung über den Account Ihres Kindes erfolgen. Achten Sie darauf, dass das korrekte Geburtsdatum hinterlegt ist, um den Jugendrabatt zu erhalten."
category: tennishalle
sortOrder: 3
